<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAE CV Builder</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>UAE CV Builder</h1>

<form id="cvForm">

<h2>Personal Details</h2>

<label>Full Name</label>
<input type="text" id="fullName">

<label>Date of Birth</label>
<input type="date" id="dob">

<label>Nationality</label>
<input type="text" id="nationality">

<label>Passport Number</label>
<input type="text" id="passportNumber">

<label>Passport Expiry</label>
<input type="date" id="passportExpiry">

<label>Visa Status (UAE)</label>
<input type="text" id="visaStatus">

<label>Visa Expiry</label>
<input type="date" id="visaExpiry">

<label>Designation</label>
<input list="designations" id="designation">
<datalist id="designations"></datalist>

<label>Job Description</label>
<select id="jobDescription">
<option value="">Select Job Description</option>
</select>

<label>Upload Photo</label>
<input type="file" id="profilePic" accept="image/*" capture="environment">

<button type="button" id="generateBtn">Generate CV Preview</button>

<button type="button" id="downloadBtn">Download PDF</button>

<!-- PI PAYMENT BUTTON -->
<button type="button" id="Payhere">Test Pi Payment</button>

</form>

<div id="cvPreview">

<h2>CV Preview</h2>

<img id="previewPic" src="assets/placeholder.png">

<p id="previewName"></p>
<p id="previewDOB"></p>
<p id="previewNationality"></p>
<p id="previewPassport"></p>
<p id="previewVisa"></p>
<p id="previewDesignation"></p>
<p id="previewJobDescription"></p>

</div>

</div>

<!-- PDF Library -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<!-- PI SDK -->
<script src="https://www.minepi.com/sdk/pi-sdk.js"></script>

<script src="script.js"></script>

</body>
</html>
